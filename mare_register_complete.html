<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登録完了 | MARE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#0a1628;--navy2:#0d1f3c;--accent:#e8a020;--gray:rgba(255,255,255,.6);}
body{font-family:"Noto Sans JP",sans-serif;background:var(--navy);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:60px 40px;max-width:520px;}
.icon{font-size:4rem;margin-bottom:24px;}
.title{font-size:1.8rem;font-weight:700;margin-bottom:12px;line-height:1.4;}
.title em{font-style:normal;color:var(--accent);}
.desc{font-size:.9rem;color:var(--gray);line-height:1.9;margin-bottom:36px;}
.btn{display:block;width:100%;padding:14px;margin-bottom:12px;font-family:"Space Mono",monospace;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;}
.btn-primary{background:var(--accent);color:var(--navy);}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--gray);}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">✅</div>
  <h1 class="title">登録が<em>完了</em>しました！</h1>
  <p class="desc">
    ご登録ありがとうございます。<br>
    審査完了（通常1〜2営業日）後、<br>
    すべての機能をご利用いただけます。
  </p>
  <a href="mare_search.html" class="btn btn-primary">設備を探してみる →</a>
  <a href="index.html" class="btn btn-secondary">トップページに戻る</a>
</div>
</body>
</html>
